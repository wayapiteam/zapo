name: release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch: # manual re-publish from the default branch (e.g. retry a tag publish that failed after the tag was already consumed)

permissions: {}

concurrency:
    group: release-publish
    cancel-in-progress: false

jobs:
    publish:
        env:
          CR_PAT: ${{ secrets.GHCR_PAT }}
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            id-token: write # OIDC token exchanged for npm publish credentials
        # environment: npm-publish   # optional: gate publishes behind required reviewers

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false # job publishes via OIDC and never git-pushes

            - uses: ./.github/actions/setup-node

            - name: upgrade npm for trusted publishing
              # pin 11.18.0: OIDC needs npm >= 11.5.1, and npm 12 breaks changeset publish's
              # published-version check (it misreads every package as unpublished and retries it)
              run: npm install -g npm@11.18.0

            - name: build core + packages
              run: |
                  npm run build
                  npm run build:packages

            - name: publish core (wayapiteam/zapo-js), skip if version already on npm
              run: |
                  VERSION="$(node -p "require('./package.json').version")"
                  PUBLISHED="$(npm view "wayapiteam/zapo@$VERSION" version 2>/dev/null || true)"
                  if [ -n "$PUBLISHED" ]; then
                    echo "wayapiteam/zapo@$VERSION already on npm, skipping"
                  else
                    npm publish
                  fi
